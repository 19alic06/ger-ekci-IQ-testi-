<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Profesyonel Bilişsel Değerlendirme</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f12; color: #e0e0e0; display: flex; justify-content: center; padding: 40px; margin: 0; }
        .test-container { background: #1a1a20; padding: 40px; border-radius: 12px; width: 100%; max-width: 600px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        h1 { color: #58a6ff; margin-top: 0; font-size: 1.5rem; }
        .question { font-size: 1.2rem; margin-bottom: 25px; line-height: 1.5; }
        button { display: block; width: 100%; padding: 14px; margin: 10px 0; background: transparent; color: #fff; border: 1px solid #444; border-radius: 6px; cursor: pointer; transition: 0.3s; text-align: left; }
        button:hover { background: #26262d; border-color: #58a6ff; }
        #progress { height: 4px; background: #333; margin-bottom: 25px; border-radius: 2px; }
        #bar { height: 100%; background: #58a6ff; width: 0%; transition: width 0.4s; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="test-container">
    <div id="progress"><div id="bar"></div></div>
    <div id="quiz-body">
        <h1 id="q-number">Soru 1 / 15</h1>
        <p class="question" id="question-text">Soru yükleniyor...</p>
        <div id="options-container"></div>
    </div>
</div>

<script>
    
    document.onkeydown = function(e) {
        if(e.keyCode == 123) return false; 
        if(e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) return false;
        if(e.ctrlKey && e.keyCode == 85) return false;
    };

    const questions = [
        { q: "Bir dizideki eksik: 3, 6, 12, 24, ?", options: ["36", "42", "48", "54"], correct: 2 },
        { q: "Sözel Analoji: 'Kaos' düzensizlikse, 'Vakıf' nedir?", options: ["Sermaye", "Kuruluş", "Bağış", "Varlık"], correct: 1 },
        { q: "Matematik: Bir babanın yaşı oğlunun yaşının 3 katıdır. 10 yıl sonra 2 katı olacağına göre, oğul şu an kaç yaşındadır?", options: ["10", "15", "20", "25"], correct: 0 },
        { q: "Mantık: Hangi sayı serisi 'asal' değildir?", options: ["2, 3, 5", "11, 13, 17", "19, 23, 29", "27, 31, 37"], correct: 3 },
        { q: "Uzamsal: Bir küpün tüm yüzeyleri boyanıp 27 küçük eş küpe bölünürse, boyasız kaç küp kalır?", options: ["0", "1", "3", "6"], correct: 1 },
        { q: "Sayısal: 100, 95, 85, 70, 50, ?", options: ["25", "30", "35", "40"], correct: 0 },
        { q: "Analoji: 'Elmas' karbon ise, 'Yakut' nedir?", options: ["Altın", "Alüminyum Oksit", "Silisyum", "Demir"], correct: 1 },
        { q: "Mantık: Eğer tüm 'A'lar 'B' ise ve bazı 'B'ler 'C' ise, aşağıdakilerden hangisi kesinlikle doğrudur?", options: ["Bazı A'lar C'dir", "Tüm A'lar C'dir", "Bazı B'ler A'dır", "Hiçbiri"], correct: 2 },
        { q: "Matematik: 2 üzeri 10 - 2 üzeri 9 kaçtır?", options: ["2 üzeri 1", "2 üzeri 8", "2 üzeri 9", "2 üzeri 10"], correct: 2 },
        { q: "Sözel: 'İrtifa' kelimesinin eş anlamlısı nedir?", options: ["Derinlik", "Yükseklik", "Eğim", "Mesafe"], correct: 1 },
        { q: "Sayısal: 1/2 + 1/4 + 1/8 + 1/16 + 1/32 = ?", options: ["31/32", "15/16", "63/64", "1"], correct: 0 },
        { q: "Mantık: Bir yarışta 2. sıradaki kişiyi geçersen kaçıncı olursun?", options: ["1.", "2.", "3.", "Değişmez"], correct: 1 },
        { q: "Uzamsal: 4x4 bir ızgarada kaç farklı kare (her boyutta) bulunur?", options: ["16", "20", "25", "30"], correct: 3 },
        { q: "Sözel: 'Zevahiri kurtarmak' deyiminin anlamı nedir?", options: ["Görüntüyü kurtarmak", "Gerçekleri saklamak", "İyilik yapmak", "Zararı azaltmak"], correct: 0 },
        { q: "Matematik: Bir saatin akrebi 3 saatte kaç derece döner?", options: ["45", "90", "180", "360"], correct: 1 }
    ];

    let cur = 0, score = 0;

    function render() {
        if(cur >= questions.length) {
            let iq = Math.round((score / questions.length) * 80 + 70);
            document.querySelector('.test-container').innerHTML = `<h1>Test Tamamlandı</h1><p style="font-size: 1.5rem;">Tahmini IQ Skorun: <strong>${iq}</strong></p><p>Sonuçlar bilimsel bir tanı değil, genel bir bilişsel yetenek tahminidir.</p>`;
            return;
        }
        document.getElementById('bar').style.width = (cur / questions.length) * 100 + "%";
        document.getElementById('q-number').innerText = `Soru ${cur + 1} / ${questions.length}`;
        document.getElementById('question-text').innerText = questions[cur].q;
        const optCont = document.getElementById('options-container');
        optCont.innerHTML = '';
        questions[cur].options.forEach((o, i) => {
            const b = document.createElement('button');
            b.innerText = o;
            b.onclick = () => {
                if(i === questions[cur].correct) score++;
                cur++; render();
            };
            optCont.appendChild(b);
        });
    }
    render();
</script>
</body>
</html>
